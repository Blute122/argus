# Phase 1 infrastructure for the real-SIEM transformation.
#
# Brings up the log store (OpenSearch) + admin UI (Dashboards) + relational
# metadata DB (Postgres). Run the FastAPI backend and Vite frontend locally
# against these, or containerize them in a later phase.
#
#   docker compose up -d
#   # then, for the backend, in backend/.env:
#   #   OPENSEARCH_ENABLED=true
#   #   DATABASE_URL=postgresql+psycopg2://soc:soc@localhost:5432/soc
#
# OpenSearch admin password is set below; keep it out of source control in prod.

services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: soc-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=Soc!Secur3Pass"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:Soc!Secur3Pass https://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: soc-opensearch-dashboards
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch:9200"]'
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    environment:
      - POSTGRES_USER=soc
      - POSTGRES_PASSWORD=soc
      - POSTGRES_DB=soc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  opensearch-data:
  postgres-data:
